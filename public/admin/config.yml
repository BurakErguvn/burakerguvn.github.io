# Decap CMS — iki dilli (TR/EN) yapılandırma
#
# GitHub Pages statik olduğu için Decap'in "Login with GitHub" akışı bir
# OAuth proxy'si ister. Proxy, GitHub OAuth kodunu sunucu tarafında token'a
# çevirir ve Decap'e postMessage ile iletir. İki endpoint sağlamalıdır:
#   /auth      -> GitHub yetkilendirme akışını başlatır
#   /callback  -> GitHub kodunu alır, token'a çevirir, Decap'e geri gönderir
#
# Önerilen hazır proxy'ler (Cloudflare Worker, ücretsiz):
#   - https://github.com/sterlingwes/decap-proxy
#   - https://github.com/ottmartens/decap-cms-github-oauth-provider-cloudflare
#
# Kurulum özeti:
#   1) GitHub'da OAuth App oluştur (Settings > Developer settings > OAuth Apps).
#      Callback URL: https://<proxy-url>/callback
#   2) Proxy'yi Cloudflare Worker'a deploy et; Client ID/Secret'u worker
#      secret'leri olarak ekle (GITHUB_OAUTH_ID / GITHUB_OAUTH_SECRET).
#   3) Aşağıdaki base_url'i kendi proxy URL'inle değiştir.

backend:
  name: github
  repo: burakerguvn/burakerguvn.github.io
  branch: main
  base_url: https://decap-proxy.erguvenburak-dev.workers.dev
  auth_endpoint: /auth

# Statik exportta medya /admin altında değil, repo kökünde public/ tutulur
media_folder: "public/uploads"
public_folder: "/uploads"

# İki dilli: her post için index.tr.mdx ve index.en.mdx
i18n:
  structure: multiple_files
  locales: [tr, en]
  default_locale: tr

collections:
  - name: posts
    label: "Yazılar / Writing"
    label_singular: "Yazı / Post"
    folder: content/posts
    create: true
    delete: true
    extension: mdx
    format: frontmatter
    slug: "{{slug}}"
    path: "{{slug}}/index"
    i18n: true
    summary: "{{title}} — {{date}}"
    fields:
      - { name: title, label: "Başlık / Title", widget: string, i18n: true }
      - { name: dek, label: "Alt başlık / Dek", widget: string, required: false, i18n: true }
      - { name: date, label: "Tarih / Date", widget: datetime, i18n: duplicate }
      - { name: tags, label: "Etiketler / Tags", widget: list, required: false, i18n: true }
      - { name: draft, label: "Taslak / Draft", widget: boolean, default: false, i18n: duplicate }
      - { name: body, label: "İçerik / Body", widget: markdown, i18n: true }

  - name: research
    label: "Araştırma / Research"
    label_singular: "Araştırma notu / Research note"
    folder: content/research
    create: true
    delete: true
    extension: mdx
    format: frontmatter
    slug: "{{slug}}"
    path: "{{slug}}/index"
    i18n: true
    summary: "{{title}} — {{date}}"
    fields:
      - { name: title, label: "Başlık / Title", widget: string, i18n: true }
      - { name: dek, label: "Alt başlık / Dek", widget: string, required: false, i18n: true }
      - { name: date, label: "Tarih / Date", widget: datetime, i18n: duplicate }
      - { name: tags, label: "Etiketler / Tags", widget: list, required: false, i18n: true }
      - { name: draft, label: "Taslak / Draft", widget: boolean, default: false, i18n: duplicate }
      - { name: body, label: "İçerik / Body", widget: markdown, i18n: true }

  - name: notes
    label: "Notlar / Notes"
    label_singular: "Not / Note"
    folder: content/notes
    create: true
    delete: true
    extension: mdx
    format: frontmatter
    slug: "{{slug}}"
    path: "{{slug}}/index"
    i18n: true
    summary: "{{title}} — {{date}}"
    fields:
      - { name: title, label: "Başlık / Title", widget: string, i18n: true }
      - { name: dek, label: "Alt başlık / Dek", widget: string, required: false, i18n: true }
      - { name: date, label: "Tarih / Date", widget: datetime, i18n: duplicate }
      - { name: tags, label: "Etiketler / Tags", widget: list, required: false, i18n: true }
      - { name: draft, label: "Taslak / Draft", widget: boolean, default: false, i18n: duplicate }
      - { name: body, label: "İçerik / Body", widget: markdown, i18n: true }

  # Özgeçmiş — tek JSON dosyası (i18n'siz; iki dillilik {tr,en} nesneleri içinde)
  - name: cv
    label: "Özgeçmiş / CV"
    delete: false
    editor:
      preview: false
    files:
      - name: cv
        label: "Özgeçmiş / CV"
        file: content/cv/cv.json
        editor:
          preview: false
        fields:
          - { name: name, label: "Ad / Name", widget: string }
          - label: "Ünvan / Title"
            name: title
            widget: object
            collapsed: true
            fields:
              - { name: tr, label: "Türkçe", widget: string }
              - { name: en, label: "English", widget: string }
          - label: "Konum / Location"
            name: location
            widget: object
            collapsed: true
            fields:
              - { name: tr, label: "Türkçe", widget: string }
              - { name: en, label: "English", widget: string }
          - { name: email, label: "E-posta / Email", widget: string }
          - label: "Bağlantılar / Links"
            name: links
            widget: object
            collapsed: true
            fields:
              - { name: github, label: "GitHub", widget: string, required: false }
              - { name: linkedin, label: "LinkedIn", widget: string, required: false }
              - { name: scholar, label: "Google Scholar", widget: string, required: false }
          - { name: avatar, label: "Avatar yolu / Avatar path", widget: string, required: false }
          - label: "Özet / Summary"
            name: summary
            widget: object
            collapsed: true
            fields:
              - { name: tr, label: "Türkçe", widget: text }
              - { name: en, label: "English", widget: text }
          - label: "Eğitim / Education"
            name: education
            widget: list
            collapsed: true
            fields:
              - label: "Derece / Degree"
                name: degree
                widget: object
                collapsed: true
                fields:
                  - { name: tr, label: "Türkçe", widget: string }
                  - { name: en, label: "English", widget: string }
              - { name: institution, label: "Kurum / Institution", widget: string }
              - { name: start, label: "Başlangıç / Start", widget: string }
              - label: "Bitiş / End"
                name: end
                widget: object
                collapsed: true
                fields:
                  - { name: tr, label: "Türkçe", widget: string }
                  - { name: en, label: "English", widget: string }
              - label: "Not / Note"
                name: note
                widget: object
                collapsed: true
                required: false
                fields:
                  - { name: tr, label: "Türkçe", widget: text }
                  - { name: en, label: "English", widget: text }
          - label: "Araştırma İlgi Alanları / Research Interests"
            name: researchInterests
            widget: list
            collapsed: true
            fields:
              - { name: tr, label: "Türkçe", widget: string }
              - { name: en, label: "English", widget: string }
          - label: "Yetenekler / Skills"
            name: skills
            widget: list
            collapsed: true
            fields:
              - label: "Kategori / Category"
                name: category
                widget: object
                collapsed: true
                fields:
                  - { name: tr, label: "Türkçe", widget: string }
                  - { name: en, label: "English", widget: string }
              - label: "Maddeler / Items"
                name: items
                widget: list
          - label: "Deneyim / Experience"
            name: experience
            widget: list
            collapsed: true
            fields:
              - label: "Rol / Role"
                name: role
                widget: object
                collapsed: true
                fields:
                  - { name: tr, label: "Türkçe", widget: string }
                  - { name: en, label: "English", widget: string }
              - { name: org, label: "Kurum / Org", widget: string }
              - { name: start, label: "Başlangıç / Start", widget: string }
              - label: "Bitiş / End"
                name: end
                widget: object
                collapsed: true
                fields:
                  - { name: tr, label: "Türkçe", widget: string }
                  - { name: en, label: "English", widget: string }
              - label: "Açıklama / Description"
                name: description
                widget: object
                collapsed: true
                fields:
                  - { name: tr, label: "Türkçe", widget: text }
                  - { name: en, label: "English", widget: text }
          - label: "Projeler / Projects"
            name: projects
            widget: list
            collapsed: true
            fields:
              - { name: name, label: "Ad / Name", widget: string }
              - label: "Açıklama / Description"
                name: description
                widget: object
                collapsed: true
                fields:
                  - { name: tr, label: "Türkçe", widget: text }
                  - { name: en, label: "English", widget: text }
              - label: "Etiketler / Tags"
                name: tags
                widget: list
                required: false
              - { name: link, label: "Bağlantı / Link", widget: string, required: false }
          - label: "Yayınlar / Publications"
            name: publications
            widget: list
            collapsed: true
            required: false
            fields:
              - { name: title, label: "Başlık / Title", widget: string }
              - { name: venue, label: "Yer / Venue", widget: string }
              - { name: year, label: "Yıl / Year", widget: string }
              - { name: link, label: "Bağlantı / Link", widget: string, required: false }
          - label: "Sertifikalar / Certifications"
            name: certifications
            widget: list
            collapsed: true
            required: false
            fields:
              - label: "Ad / Name"
                name: name
                widget: object
                collapsed: true
                fields:
                  - { name: tr, label: "Türkçe", widget: string }
                  - { name: en, label: "English", widget: string }
              - { name: issuer, label: "Veren / Issuer", widget: string }
              - { name: year, label: "Yıl / Year", widget: string }
              - { name: link, label: "Bağlantı / Link", widget: string, required: false }
          - label: "Diller / Languages"
            name: languages
            widget: list
            collapsed: true
            fields:
              - label: "Dil / Name"
                name: name
                widget: object
                collapsed: true
                fields:
                  - { name: tr, label: "Türkçe", widget: string }
                  - { name: en, label: "English", widget: string }
              - label: "Seviye / Level"
                name: level
                widget: object
                collapsed: true
                fields:
                  - { name: tr, label: "Türkçe", widget: string }
                  - { name: en, label: "English", widget: string }
